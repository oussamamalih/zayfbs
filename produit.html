<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
        <nav id="navbar">
    <div class="nav-logo">
    <a href="">
        <img src="images/ZayFBS nvLOgo-01.png" alt="ZayFBS nav logo" >
    </a>
    </div>
    <div class="nav-links">
      <a href="#" class="active" data-page="home">Accueil</a>
      <a href="#" data-page="products">Nos Produits</a>
      <a href="#" data-page="contact">Nous Contacter</a>
    </div>
    <button class="nav-cart-btn" id="cartBtn">
    
        <img  src="images/shopping-bag.png" >
     
    </button>
  </nav>

   <!-- ========================= PAGE: PRODUITS ========================= -->
  <div class="page" id="page-products">
    <div class="page-header">
      <h1>Nos Produits</h1>
      <p>Découvrez notre gamme d'huiles<br>d'olive extra vierge de Fquih Ben Saleh</p>
    </div>
    <div class="products-wrapper">
      <button class="btn-add-product" id="openAddModal">+ Ajouter un produit</button>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </div>



  <!-- =================== MODAL: ADD / EDIT PRODUCT =================== -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <button class="modal-close" id="closeModal">✕</button>
      <h2 class="modal-title" id="modalTitle">Ajouter un produit</h2>
      <input type="hidden" id="editId"/>
      <div class="form-row-2">
        <div class="form-group" id="fg-ptitle">
          <label>Nom du produit *</label>
          <input type="text" id="pTitle" placeholder="Ex: Huile Extra Vierge 500ml"/>
          <span class="err-msg">Ce champ est obligatoire.</span>
        </div>
        <div class="form-group" id="fg-pprice">
          <label>Prix (DH) *</label>
          <input type="number" id="pPrice" placeholder="Ex: 89" min="0"/>
          <span class="err-msg">Prix invalide.</span>
        </div>
      </div>
      <div class="form-group" id="fg-pdesc">
        <label>Description *</label>
        <textarea id="pDesc" rows="3" placeholder="Décrivez votre produit..."></textarea>
        <span class="err-msg">Ce champ est obligatoire.</span>
      </div>
      <div class="form-group">
        <label>URL de l'image (optionnel)</label>
        <input type="url" id="pImg" placeholder="https://..."/>
      </div>
      <div class="modal-actions">
        <button class="btn-m-reset"  id="btnResetProduct">Réinitialiser</button>
        <button class="btn-m-submit" id="btnSaveProduct">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ========================= CART PANEL ========================= -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-head">
      <h2>Mon Panier</h2>
      <button id="closeCart">✕</button>
    </div>
    <div class="cart-body" id="cartBody"></div>
    <div class="cart-foot" id="cartFoot">
      <div class="cart-total-row">
        <span>Total</span>
        <strong id="cartTotal">0.00 DH</strong>
      </div>
      <button class="btn-checkout" id="btnCheckout">Passer la commande →</button>
      <button class="btn-clear-cart" id="btnClearCart">Vider le panier</button>
    </div>
  </div>

  <!-- ====================== CONFIRM DELETE ====================== -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal confirm-modal">
      <div class="confirm-icon">🗑️</div>
      <h3>Supprimer ce produit ?</h3>
      <p>Cette action est irréversible.</p>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn-m-reset" id="btnCancelDelete">Annuler</button>
        <button class="btn-danger"  id="btnConfirmDelete">Supprimer</button>
      </div>
    </div>
  </div>

</body>
</html>
