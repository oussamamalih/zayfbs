<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZayFBS – Nos Produits</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav id="navbar">
    <div class="nav-logo">
    <a href="">
        <img src="images/ZayFBS nvLOgo-01.png" alt="ZayFBS nav logo" >
    </a>
    </div>
    <div class="nav-links">
      <a href="index.html" class="active" data-page="home">Accueil</a>
      <a href="produit.html" data-page="products">Nos Produits</a>
      <a href="contact.html" data-page="contact">Nous Contacter</a>
    </div>
    <button class="nav-cart-btn" id="cartBtn">
    
        <img  src="images/shopping-bag.png" >
     
    </button>
  </nav>


  <!-- ───────────── HERO BAND ───────────── -->
  <section class="hero-band">
    <h1>Nos Produits</h1>
    <p>Découvrez notre gamme d'huiles d'olive extra vierge de Fquih Ben Saleh</p>
  </section>

  <!-- ───────────── MAIN ───────────── -->
  <main class="container">
    <div class="toolbar">
      <button class="btn-add-product" id="addProductBtn">
        <span>+</span> Ajouter un produit
      </button>
    </div>

    <div class="product-grid" id="productGrid">
      <!-- Cards générées dynamiquement par app.js -->
    </div><!-- /product-grid -->
  </main>

  

  <!-- ───────────── CART OVERLAY ───────────── -->
  <div class="overlay" id="overlay" onclick="closeCart()"></div>

  <!-- ───────────── CART SLIDE ───────────── -->
  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Mon Panier</h2>
      <button class="close-cart" id="closeCartBtn" onclick="closeCart()" aria-label="Fermer">✕</button>
    </div>

    <div class="cart-body" id="cartBody">
      <div class="cart-empty" id="cartEmpty">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <p>Votre panier est vide</p>
      </div>
      <ul class="cart-list" id="cartList"></ul>
    </div>

    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>Total</span>
        <strong id="cartTotal">0 DH</strong>
      </div>
      <button class="btn-checkout">Commander</button>
      <button class="btn-cancel-order">Annuler la commande</button>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
